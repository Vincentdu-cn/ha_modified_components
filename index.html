<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>税务知识竞答 · Tax Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== Design Tokens ========== */
:root {
  --bg-0: #0a0e1a;
  --bg-1: #0f1524;
  --bg-2: #161e30;
  --bg-3: #1c2842;
  --surface: rgba(22, 30, 48, 0.72);
  --surface-hi: rgba(28, 40, 66, 0.88);
  --border: rgba(74, 90, 126, 0.35);
  --border-hi: rgba(100, 120, 160, 0.5);
  --text-0: #f1f5ff;
  --text-1: #c4cde0;
  --text-2: #8290ac;
  --text-3: #5a6885;
  --accent: #3dd68c;
  --accent-dim: #2ba870;
  --accent-glow: rgba(61, 214, 140, 0.25);
  --warn: #fbbf24;
  --warn-glow: rgba(251, 191, 36, 0.2);
  --danger: #f05650;
  --danger-glow: rgba(240, 86, 80, 0.2);
  --info: #5b9fff;
  --info-glow: rgba(91, 159, 255, 0.2);
  --grad-1: linear-gradient(135deg, #3dd68c 0%, #22b8a0 100%);
  --grad-2: linear-gradient(135deg, #5b9fff 0%, #7c5cff 100%);
  --grad-3: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 40px var(--accent-glow);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 24px;
  --font-sans: 'Noto Sans SC', 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Sans', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-0);
  color: var(--text-0);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ========== Animated Background ========== */
.bg-aurora {
  position: fixed; inset: 0; z-index: -2; overflow: hidden;
}
.bg-aurora::before, .bg-aurora::after {
  content: ''; position: absolute; width: 600px; height: 600px;
  border-radius: 50%; filter: blur(100px); opacity: 0.15;
  animation: float 20s ease-in-out infinite;
}
.bg-aurora::before {
  background: var(--accent); top: -200px; left: -100px;
}
.bg-aurora::after {
  background: var(--info); bottom: -200px; right: -100px;
  animation-delay: -10s;
}
@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(80px, 60px) scale(1.1); }
  66% { transform: translate(-60px, 40px) scale(0.95); }
}

.bg-grid {
  position: fixed; inset: 0; z-index: -1;
  background-image:
    linear-gradient(rgba(74, 90, 126, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74, 90, 126, 0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
}

/* ========== App Container ========== */
#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  min-height: 100vh;
}

/* ========== Start Screen ========== */
.start-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; text-align: center; gap: 0;
}

.start-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 20px; border-radius: 100px;
  background: var(--accent-glow); border: 1px solid rgba(61,214,140,0.3);
  font-size: 13px; font-weight: 500; color: var(--accent);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 28px; animation: badgeIn 0.6s ease-out;
}
.start-badge .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes badgeIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }

.start-title {
  font-size: 56px; font-weight: 900; line-height: 1.1;
  background: linear-gradient(135deg, #fff 0%, #8290ac 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px; letter-spacing: -1px;
}
.start-title .accent {
  background: var(--grad-1);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.start-sub {
  font-size: 17px; color: var(--text-2); max-width: 500px; line-height: 1.7;
  margin-bottom: 40px;
}

.start-cards {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  width: 100%; max-width: 600px; margin-bottom: 40px;
}
.start-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 20px 16px; text-align: center;
  backdrop-filter: blur(20px); transition: all 0.3s;
}
.start-card:hover { border-color: var(--border-hi); transform: translateY(-2px); }
.start-card .icon { font-size: 28px; margin-bottom: 8px; display: block; }
.start-card .num { font-size: 24px; font-weight: 700; color: var(--text-0); }
.start-card .label { font-size: 12px; color: var(--text-2); margin-top: 4px; }

.start-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 48px; border: none; cursor: pointer;
  background: var(--grad-1); color: #051a0f;
  font-family: var(--font-sans); font-size: 17px; font-weight: 700;
  border-radius: 100px; letter-spacing: 0.5px;
  box-shadow: 0 8px 32px var(--accent-glow);
  transition: all 0.25s; position: relative; overflow: hidden;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px var(--accent-glow); }
.start-btn:active { transform: translateY(0); }
.start-btn .arrow { transition: transform 0.25s; }
.start-btn:hover .arrow { transform: translateX(4px); }

/* ========== Quiz Screen ========== */
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 28px;
}
.quiz-back {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--border); color: var(--text-2);
  padding: 8px 16px; border-radius: 100px; cursor: pointer;
  font-family: var(--font-sans); font-size: 13px; transition: all 0.2s;
}
.quiz-back:hover { border-color: var(--border-hi); color: var(--text-0); }

.quiz-score {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 18px; border-radius: 100px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 14px; font-weight: 600; color: var(--text-1);
}
.quiz-score .score-val {
  color: var(--accent); font-weight: 700; font-size: 16px;
}

.quiz-progress-wrap {
  margin-bottom: 32px;
}
.quiz-progress-bar {
  height: 6px; background: var(--bg-2); border-radius: 100px;
  overflow: hidden; position: relative;
}
.quiz-progress-fill {
  height: 100%; background: var(--grad-1); border-radius: 100px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 12px var(--accent-glow);
}
.quiz-progress-text {
  display: flex; justify-content: space-between;
  margin-top: 10px; font-size: 13px; color: var(--text-2);
}
.quiz-progress-text .q-type {
  display: inline-flex; align-items: center; gap: 6px;
}
.quiz-progress-text .q-type .pill {
  padding: 2px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
}
.pill-single { background: var(--info-glow); color: var(--info); }
.pill-multi { background: var(--warn-glow); color: var(--warn); }
.pill-judge { background: var(--accent-glow); color: var(--accent); }

/* Question Card */
.q-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 40px;
  backdrop-filter: blur(24px); box-shadow: var(--shadow-md);
  animation: cardIn 0.4s ease-out;
}
@keyframes cardIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

.q-number {
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  color: var(--accent); letter-spacing: 1px; margin-bottom: 12px;
}
.q-text {
  font-size: 21px; font-weight: 600; line-height: 1.6;
  color: var(--text-0); margin-bottom: 32px;
}

/* Options */
.q-options { display: flex; flex-direction: column; gap: 12px; }
.q-option {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 18px 20px; border-radius: var(--radius-md);
  background: var(--bg-1); border: 2px solid var(--border);
  cursor: pointer; transition: all 0.2s; position: relative;
}
.q-option:hover { border-color: var(--border-hi); background: var(--bg-2); }
.q-option.selected {
  border-color: var(--info); background: rgba(91,159,255,0.08);
}
.q-option.correct {
  border-color: var(--accent); background: var(--accent-glow);
}
.q-option.wrong {
  border-color: var(--danger); background: var(--danger-glow);
}
.q-option.disabled { cursor: default; pointer-events: none; }

.q-option .marker {
  flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 15px; font-weight: 700;
  background: var(--bg-3); color: var(--text-2);
  transition: all 0.2s;
}
.q-option.selected .marker { background: var(--info); color: #fff; }
.q-option.correct .marker { background: var(--accent); color: #051a0f; }
.q-option.wrong .marker { background: var(--danger); color: #fff; }

.q-option .opt-text {
  font-size: 15px; line-height: 1.6; color: var(--text-1);
  padding-top: 4px; flex: 1;
}
.q-option.correct .opt-text { color: var(--text-0); }
.q-option.wrong .opt-text { color: var(--text-0); }

.q-option .check-icon {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  width: 24px; height: 24px; opacity: 0; transition: opacity 0.2s;
}
.q-option.correct .check-icon, .q-option.wrong .check-icon { opacity: 1; }

/* Explanation */
.q-explanation {
  margin-top: 24px; padding: 20px 24px;
  background: var(--bg-1); border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm); animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.q-explanation.wrong-answer { border-left-color: var(--danger); }
.q-explanation .exp-label {
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.q-explanation.wrong-answer .exp-label { color: var(--danger); }
.q-explanation .exp-text {
  font-size: 14px; line-height: 1.8; color: var(--text-1);
}

/* Action buttons */
.q-actions {
  display: flex; justify-content: flex-end; gap: 12px; margin-top: 28px;
}
.q-btn {
  padding: 12px 32px; border: none; cursor: pointer;
  font-family: var(--font-sans); font-size: 15px; font-weight: 600;
  border-radius: 100px; transition: all 0.2s;
}
.q-btn-primary {
  background: var(--grad-1); color: #051a0f;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.q-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 28px var(--accent-glow); }
.q-btn-secondary {
  background: var(--bg-2); color: var(--text-1); border: 1px solid var(--border);
}
.q-btn-secondary:hover { border-color: var(--border-hi); color: var(--text-0); }

/* ========== Result Screen ========== */
.result-wrap {
  display: flex; flex-direction: column; align-items: center;
  min-height: 80vh; justify-content: center; text-align: center;
  animation: cardIn 0.5s ease-out;
}
.result-ring {
  position: relative; width: 200px; height: 200px; margin-bottom: 32px;
}
.result-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.result-ring .ring-bg { fill: none; stroke: var(--bg-2); stroke-width: 10; }
.result-ring .ring-fg {
  fill: none; stroke-width: 10; stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
}
.result-ring .ring-text {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.result-ring .score-num {
  font-size: 52px; font-weight: 900; line-height: 1;
  background: var(--grad-1); -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.result-ring .score-label { font-size: 13px; color: var(--text-2); margin-top: 4px; }

.result-title {
  font-size: 32px; font-weight: 700; margin-bottom: 10px;
}
.result-sub { font-size: 15px; color: var(--text-2); margin-bottom: 32px; }

.result-stats {
  display: flex; gap: 32px; margin-bottom: 36px;
}
.result-stat {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.result-stat .stat-val { font-size: 28px; font-weight: 700; }
.result-stat .stat-label { font-size: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: 1px; }
.result-stat.correct .stat-val { color: var(--accent); }
.result-stat.wrong .stat-val { color: var(--danger); }
.result-stat.total .stat-val { color: var(--info); }

.result-actions { display: flex; gap: 16px; }

/* ========== Toast ========== */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px);
  padding: 14px 28px; border-radius: 100px;
  background: var(--surface-hi); border: 1px solid var(--border-hi);
  backdrop-filter: blur(20px); box-shadow: var(--shadow-lg);
  font-size: 14px; font-weight: 500; color: var(--text-0);
  z-index: 1000; transition: transform 0.3s ease-out; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--accent); color: var(--accent); }
.toast.warn { border-color: var(--warn); color: var(--warn); }
.toast.danger { border-color: var(--danger); color: var(--danger); }

/* ========== Responsive ========== */
@media (max-width: 640px) {
  .start-title { font-size: 36px; }
  .start-cards { grid-template-columns: 1fr; }
  .q-card { padding: 24px 20px; }
  .q-text { font-size: 18px; }
  .result-stats { gap: 20px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-0); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 100px; }
</style>
</head>
<body>

<div class="bg-aurora"></div>
<div class="bg-grid"></div>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ========== Question Bank ==========
const QUESTIONS = [
  {
    type: 'single',
    q: '下列各项中，属于增值税征税范围的是？',
    options: ['销售不动产', '员工为本单位提供取得工资的服务', '存款利息', '保险赔偿金'],
    answer: [0],
    explanation: '根据《营业税改征增值税试点实施办法》，销售不动产属于增值税征税范围。员工为本单位提供取得工资的服务、存款利息、保险赔偿金均属于不征收增值税项目。'
  },
  {
    type: 'single',
    q: '目前增值税一般纳税人的标准是年应征增值税销售额超过多少万元？',
    options: ['50万元', '100万元', '500万元', '1000万元'],
    answer: [2],
    explanation: '根据现行规定，增值税一般纳税人是指年应征增值税销售额超过500万元的纳税人。该标准自2018年5月1日起执行。'
  },
  {
    type: 'multi',
    q: '下列哪些项目免征增值税？（多选）',
    options: ['农业生产者销售的自产农产品', '避孕药品和用具', '直接用于科学研究的进口仪器', '高档化妆品'],
    answer: [0, 1, 2],
    explanation: '根据《增值税暂行条例》第十五条规定，农业生产者销售的自产农产品、避孕药品和用具、直接用于科学研究、科学试验和教学的进口仪器、设备均免征增值税。高档化妆品属于消费税征税范围，不免征增值税。'
  },
  {
    type: 'judge',
    q: '小规模纳税人发生增值税应税销售行为，适用简易计税方法计税。',
    options: ['正确', '错误'],
    answer: [0],
    explanation: '正确。根据增值税相关规定，小规模纳税人发生应税销售行为适用简易计税方法，按照销售额和征收率计算应纳税额，不得抵扣进项税额。目前征收率为3%（部分业务减按1%）。'
  },
  {
    type: 'single',
    q: '企业所得税的基本税率为？',
    options: ['15%', '20%', '25%', '30%'],
    answer: [2],
    explanation: '企业所得税的基本税率为25%。符合条件的小型微利企业适用20%税率（实际有效税率更低），国家重点扶持的高新技术企业适用15%税率。'
  },
  {
    type: 'multi',
    q: '下列各项中，在计算企业所得税应纳税所得额时不得扣除的项目有？（多选）',
    options: ['向投资者支付的股息红利', '税收滞纳金', '企业发生的合理的工资薪金支出', '赞助支出'],
    answer: [0, 1, 3],
    explanation: '根据《企业所得税法》第十条规定，向投资者支付的股息红利等权益性投资收益款项、税收滞纳金、赞助支出等不得在税前扣除。企业发生的合理的工资薪金支出准予扣除。'
  },
  {
    type: 'judge',
    q: '个人取得的国债利息收入免征个人所得税。',
    options: ['正确', '错误'],
    answer: [0],
    explanation: '正确。根据《个人所得税法》第四条规定，国债和国家发行的金融债券利息免征个人所得税。'
  },
  {
    type: 'single',
    q: '个人所得税综合所得的年度汇算清缴时间为次年几月几日内？',
    options: ['3月1日至6月30日', '1月1日至3月31日', '3月1日至5月31日', '4月1日至6月30日'],
    answer: [0],
    explanation: '居民个人取得的综合所得，按年计算个人所得税，需要在次年3月1日至6月30日内办理汇算清缴。'
  },
  {
    type: 'multi',
    q: '下列属于个人所得税专项附加扣除项目的有？（多选）',
    options: ['子女教育', '继续教育', '大病医疗', '偶然所得'],
    answer: [0, 1, 2],
    explanation: '个人所得税专项附加扣除包括：子女教育、继续教育、大病医疗、住房贷款利息、住房租金、赡养老人、3岁以下婴幼儿照护七项。偶然所得属于个人所得税的税目分类，不是专项附加扣除项目。'
  },
  {
    type: 'judge',
    q: '房产税的计税依据只有房产原值一种方式。',
    options: ['正确', '错误'],
    answer: [1],
    explanation: '错误。房产税的计税依据分为两种：一是从价计征，按房产原值一次减除10%-30%后的余值计征，税率为1.2%；二是从租计征，按房产租金收入计征，税率为12%。'
  },
  {
    type: 'single',
    q: '印花税的纳税人是？',
    options: ['合同的担保人', '合同的订立人', '合同的见证人', '合同的审批人'],
    answer: [1],
    explanation: '印花税的纳税人是在中国境内书立、领受应税凭证的单位和个人，即合同的订立人。担保人、见证人、审批人均不是印花税纳税人。'
  },
  {
    type: 'multi',
    q: '下列各项中，属于车辆购置税征税范围的有？（多选）',
    options: ['汽车', '有轨电车', '汽车挂车', '自行车'],
    answer: [0, 1, 2],
    explanation: '车辆购置税的征税范围包括汽车、有轨电车、汽车挂车、排气量超过一百五十毫升的摩托车。自行车不属于车辆购置税征税范围。'
  },
  {
    type: 'judge',
    q: '城镇土地使用税以纳税人实际占用的土地面积为计税依据。',
    options: ['正确', '错误'],
    answer: [0],
    explanation: '正确。城镇土地使用税以纳税人实际占用的土地面积为计税依据，依照规定税额计算征收。'
  },
  {
    type: 'single',
    q: '消费税中，白酒的税率采用什么形式？',
    options: ['比例税率', '定额税率', '比例税率加定额税率（复合计征）', '超率累进税率'],
    answer: [2],
    explanation: '白酒消费税采用复合计征方式：比例税率为20%，加0.5元/500克的定额税率。目前只有白酒和卷烟两类产品采用复合计征。'
  },
  {
    type: 'multi',
    q: '下列哪些情形可以申请税收减免？（多选）',
    options: ['自然灾害导致重大损失', '高新技术企业研发投入', '小微企业月销售额未达起征点', '企业正常经营盈利'],
    answer: [0, 1, 2],
    explanation: '税收减免适用于法定情形：因自然灾害等不可抗力导致重大损失的可申请减免；高新技术企业享受15%优惠税率；小规模纳税人月销售额未达起征点免征增值税。企业正常经营盈利不属于减免情形。'
  }
];

// ========== State ==========
let state = {
  screen: 'start',
  currentIdx: 0,
  answers: [],
  selected: [],
  revealed: false,
  score: 0,
};

// ========== Helpers ==========
const $ = (sel) => document.querySelector(sel);
const app = () => document.getElementById('app');

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast ' + type; }, 2500);
}

function typeLabel(type) {
  return { single: '单选题', multi: '多选题', judge: '判断题' }[type];
}
function typePill(type) {
  return { single: 'pill-single', multi: 'pill-multi', judge: 'pill-judge' }[type];
}

// ========== Render ==========
function render() {
  const s = state.screen;
  if (s === 'start') renderStart();
  else if (s === 'quiz') renderQuiz();
  else if (s === 'result') renderResult();
}

function renderStart() {
  const correctCount = QUESTIONS.filter(q => q.answer.length === 1).length;
  const multiCount = QUESTIONS.filter(q => q.type === 'multi').length;
  app().innerHTML = `
    <div class="start-wrap">
      <div class="start-badge"><span class="dot"></span>TAX KNOWLEDGE QUIZ</div>
      <h1 class="start-title">税务知识<span class="accent">竞答</span></h1>
      <p class="start-sub">涵盖增值税、企业所得税、个人所得税、房产税、消费税等核心税种，挑战你的税务知识储备</p>
      <div class="start-cards">
        <div class="start-card">
          <span class="icon">📝</span>
          <div class="num">${QUESTIONS.length}</div>
          <div class="label">题目总数</div>
        </div>
        <div class="start-card">
          <span class="icon">🏷️</span>
          <div class="num">${multiCount}</div>
          <div class="label">多选题</div>
        </div>
        <div class="start-card">
          <span class="icon">📊</span>
          <div class="num">5</div>
          <div class="label">税种覆盖</div>
        </div>
      </div>
      <button class="start-btn" onclick="startQuiz()">
        开始答题
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>
  `;
}

function startQuiz() {
  state = { screen: 'quiz', currentIdx: 0, answers: [], selected: [], revealed: false, score: 0 };
  render();
}

function renderQuiz() {
  const idx = state.currentIdx;
  const q = QUESTIONS[idx];
  const progress = ((idx) / QUESTIONS.length) * 100;
  const correctSoFar = state.answers.filter((a, i) => arraysEqual(a, QUESTIONS[i].answer)).length;

  app().innerHTML = `
    <div class="quiz-header">
      <button class="quiz-back" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        退出
      </button>
      <div class="quiz-score">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4L12 17l-6.3 4.4L8 14 2 9.4h7.6z"/></svg>
        <span>得分 <span class="score-val">${state.score}</span></span>
      </div>
    </div>

    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="quiz-progress-text">
        <span>第 ${idx + 1} / ${QUESTIONS.length} 题</span>
        <span class="q-type">
          <span class="pill ${typePill(q.type)}">${typeLabel(q.type)}</span>
        </span>
      </div>
    </div>

    <div class="q-card">
      <div class="q-number">QUESTION ${String(idx + 1).padStart(2, '0')}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options" id="options">
        ${q.options.map((opt, i) => `
          <div class="q-option" data-idx="${i}" onclick="selectOption(${i})">
            <div class="marker">${String.fromCharCode(65 + i)}</div>
            <div class="opt-text">${opt}</div>
            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="${state.revealed && !q.answer.includes(i) ? 'var(--danger)' : 'var(--accent)'}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              ${q.answer.includes(i)
                ? '<path d="M20 6L9 17l-5-5"/>'
                : '<path d="M18 6L6 18M6 6l12 12"/>'}
            </svg>
          </div>
        `).join('')}
      </div>
      <div id="explanation-slot"></div>
      <div class="q-actions" id="actions">
        ${state.revealed
          ? `<button class="q-btn q-btn-primary" onclick="nextQuestion()">${idx + 1 < QUESTIONS.length ? '下一题' : '查看结果'}
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left:6px;vertical-align:-3px"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </button>`
          : `<button class="q-btn q-btn-primary" onclick="submitAnswer()">提交答案</button>`
        }
      </div>
    </div>
  `;

  if (state.revealed) showExplanation();
  else {
    // restore selected state visually
    state.selected.forEach(i => {
      const el = document.querySelector(`.q-option[data-idx="${i}"]`);
      if (el) el.classList.add('selected');
    });
  }
}

function selectOption(i) {
  if (state.revealed) return;
  const q = QUESTIONS[state.currentIdx];

  if (q.type === 'multi') {
    if (state.selected.includes(i)) {
      state.selected = state.selected.filter(x => x !== i);
    } else {
      state.selected.push(i);
    }
  } else {
    state.selected = [i];
  }

  // update visual
  document.querySelectorAll('.q-option').forEach(el => el.classList.remove('selected'));
  state.selected.forEach(idx => {
    const el = document.querySelector(`.q-option[data-idx="${idx}"]`);
    if (el) el.classList.add('selected');
  });
}

function submitAnswer() {
  if (state.selected.length === 0) {
    toast('请先选择答案', 'warn');
    return;
  }
  const q = QUESTIONS[state.currentIdx];
  const isCorrect = arraysEqual([...state.selected].sort((a,b)=>a-b), [...q.answer].sort((a,b)=>a-b));

  state.answers[state.currentIdx] = [...state.selected];
  state.revealed = true;

  // mark options
  document.querySelectorAll('.q-option').forEach(el => {
    el.classList.add('disabled');
    el.classList.remove('selected');
    const idx = parseInt(el.dataset.idx);
    if (q.answer.includes(idx)) el.classList.add('correct');
    else if (state.selected.includes(idx)) el.classList.add('wrong');
  });

  if (isCorrect) {
    const points = q.type === 'multi' ? 2 : 1;
    state.score += points;
    toast(`回答正确 +${points}分`, 'success');
  } else {
    toast('回答错误', 'danger');
  }

  showExplanation();

  // update button
  const actions = document.getElementById('actions');
  actions.innerHTML = `
    <button class="q-btn q-btn-primary" onclick="nextQuestion()">
      ${state.currentIdx + 1 < QUESTIONS.length ? '下一题' : '查看结果'}
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left:6px;vertical-align:-3px"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  `;
}

function showExplanation() {
  const q = QUESTIONS[state.currentIdx];
  const isCorrect = state.answers[state.currentIdx] && arraysEqual([...state.answers[state.currentIdx]].sort((a,b)=>a-b), [...q.answer].sort((a,b)=>a-b));
  const slot = document.getElementById('explanation-slot');
  if (!slot) return;
  slot.innerHTML = `
    <div class="q-explanation ${isCorrect ? '' : 'wrong-answer'}">
      <div class="exp-label">
        ${isCorrect
          ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
          : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>'
        }
        ${isCorrect ? '回答正确 · 解析' : '回答错误 · 解析'}
      </div>
      <div class="exp-text">${q.explanation}</div>
    </div>
  `;
}

function nextQuestion() {
  if (state.currentIdx + 1 < QUESTIONS.length) {
    state.currentIdx++;
    state.selected = [];
    state.revealed = false;
    render();
  } else {
    state.screen = 'result';
    render();
  }
}

function goBack() {
  state.screen = 'start';
  render();
}

function renderResult() {
  const correct = state.answers.filter((a, i) => a && arraysEqual([...a].sort((a,b)=>a-b), [...QUESTIONS[i].answer].sort((a,b)=>a-b))).length;
  const wrong = QUESTIONS.length - correct;
  const maxScore = QUESTIONS.reduce((s, q) => s + (q.type === 'multi' ? 2 : 1), 0);
  const percent = Math.round((state.score / maxScore) * 100);

  let grade, gradeColor, msg;
  if (percent >= 90) { grade = '优秀'; gradeColor = 'var(--accent)'; msg = '你是税务知识达人！'; }
  else if (percent >= 70) { grade = '良好'; gradeColor = 'var(--info)'; msg = '基础扎实，继续加油！'; }
  else if (percent >= 50) { grade = '及格'; gradeColor = 'var(--warn)'; msg = '还需多学习税务知识哦'; }
  else { grade = '需努力'; gradeColor = 'var(--danger)'; msg = '建议系统学习税法基础知识'; }

  const circumference = 2 * Math.PI * 85;
  const offset = circumference - (percent / 100) * circumference;

  app().innerHTML = `
    <div class="result-wrap">
      <div class="result-ring">
        <svg viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="85"/>
          <circle class="ring-fg" cx="100" cy="100" r="85"
            stroke="${gradeColor}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"
            style="stroke-dashoffset:${offset}"
          />
        </svg>
        <div class="ring-text">
          <div class="score-num">${state.score}<span style="font-size:24px;color:var(--text-2)">/${maxScore}</span></div>
          <div class="score-label">${percent}% · ${grade}</div>
        </div>
      </div>
      <div class="result-title" style="color:${gradeColor}">${msg}</div>
      <div class="result-sub">共 ${QUESTIONS.length} 题，你答对 ${correct} 题</div>
      <div class="result-stats">
        <div class="result-stat correct">
          <div class="stat-val">${correct}</div>
          <div class="stat-label">答对</div>
        </div>
        <div class="result-stat wrong">
          <div class="stat-val">${wrong}</div>
          <div class="stat-label">答错</div>
        </div>
        <div class="result-stat total">
          <div class="stat-val">${QUESTIONS.length}</div>
          <div class="stat-label">总题数</div>
        </div>
      </div>
      <div class="result-actions">
        <button class="q-btn q-btn-secondary" onclick="goBack()">返回首页</button>
        <button class="q-btn q-btn-primary" onclick="startQuiz()">再来一次</button>
      </div>
    </div>
  `;
}

// ========== Utils ==========
function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

// ========== Init ==========
render();
</script>
</body>
</html>
