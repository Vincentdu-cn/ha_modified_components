<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>税务知识竞答 · 多风格切换</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;600;700&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Base reset — themes provide their own CSS */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { min-height: 100vh; transition: background 300ms ease; }

/* Switcher bar — minimal, neutral */
.switcher-bar {
  position: sticky; top: 0; z-index: 1000;
  background: #fff; border-bottom: 1px solid #e0e0e0;
  padding: 8px 12px; display: flex; align-items: center; gap: 6px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.switcher-bar::-webkit-scrollbar { height: 0; }
.switcher-label {
  font-size: 11px; font-weight: 600; color: #888;
  letter-spacing: 0.1em; text-transform: uppercase;
  white-space: nowrap; margin-right: 4px; flex-shrink: 0;
}
.theme-btn {
  padding: 5px 12px; border: 1px solid #ddd; border-radius: 6px;
  background: #fff; color: #555;
  font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all 150ms ease;
}
.theme-btn:hover { border-color: #999; color: #111; }
.theme-btn.active { background: #111; border-color: #111; color: #fff; }

/* Toast — neutral */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 12px 24px; border-radius: 8px;
  background: #1a1a1a; color: #fff;
  font-size: 14px; font-weight: 500;
  z-index: 2000; transition: transform 0.25s ease; pointer-events: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: #1a7a3a; }
.toast.warn { background: #c8820a; }
.toast.danger { background: #b5392c; }

/* Style cache for injected CSS */
#style-cache { display: none; }

@media (max-width: 640px) {
  .switcher-label { display: none; }
}
</style>
</head>
<body>

<div class="switcher-bar" id="switcher">
  <span class="switcher-label">风格</span>
</div>

<div id="style-cache"></div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<!-- Theme render functions -->
<script src="themes-combined.js"></script>

<script>
// ========== Theme Definitions ==========
const THEMES = [
  { id: 'swiss',      name: '瑞士极简', render: render_swiss },
  { id: 'zen',        name: '禅意',     render: render_zen },
  { id: 'scandi',     name: '北欧',     render: render_scandi },
  { id: 'editorial',  name: '杂志',     render: render_editorial },
  { id: 'brutalist',  name: '粗野',     render: render_brutalist },
  { id: 'flat',       name: '扁平',     render: render_flat },
  { id: 'neobrutal',  name: '新粗野',   render: render_neobrutal },
  { id: 'notion',     name: 'Notion',   render: render_notion },
];

let currentTheme = 'swiss';

// Build switcher buttons
const switcher = document.getElementById('switcher');
THEMES.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn' + (t.id === 'swiss' ? ' active' : '');
  btn.textContent = t.name;
  btn.dataset.theme = t.id;
  btn.onclick = () => switchTheme(t.id);
  switcher.appendChild(btn);
});

function switchTheme(themeId) {
  currentTheme = themeId;
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === themeId);
  });
  try { localStorage.setItem('quiz-theme', themeId); } catch(e) {}
  render();
  // scroll to top on theme switch
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Restore saved theme
try {
  const saved = localStorage.getItem('quiz-theme');
  if (saved && THEMES.find(t => t.id === saved)) {
    currentTheme = saved;
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === saved);
    });
  }
} catch(e) {}

// ========== Question Bank ==========
const QUESTIONS = [
  { type: 'single', q: '下列各项中，属于增值税征税范围的是？', options: ['销售不动产', '员工为本单位提供取得工资的服务', '存款利息', '保险赔偿金'], answer: [0], explanation: '根据《营业税改征增值税试点实施办法》，销售不动产属于增值税征税范围。员工为本单位提供取得工资的服务、存款利息、保险赔偿金均属于不征收增值税项目。' },
  { type: 'single', q: '目前增值税一般纳税人的标准是年应征增值税销售额超过多少万元？', options: ['50万元', '100万元', '500万元', '1000万元'], answer: [2], explanation: '根据现行规定，增值税一般纳税人是指年应征增值税销售额超过500万元的纳税人。该标准自2018年5月1日起执行。' },
  { type: 'multi', q: '下列哪些项目免征增值税？（多选）', options: ['农业生产者销售的自产农产品', '避孕药品和用具', '直接用于科学研究的进口仪器', '高档化妆品'], answer: [0, 1, 2], explanation: '根据《增值税暂行条例》第十五条规定，农业生产者销售的自产农产品、避孕药品和用具、直接用于科学研究、科学试验和教学的进口仪器、设备均免征增值税。高档化妆品属于消费税征税范围，不免征增值税。' },
  { type: 'judge', q: '小规模纳税人发生增值税应税销售行为，适用简易计税方法计税。', options: ['正确', '错误'], answer: [0], explanation: '正确。根据增值税相关规定，小规模纳税人发生应税销售行为适用简易计税方法，按照销售额和征收率计算应纳税额，不得抵扣进项税额。目前征收率为3%（部分业务减按1%）。' },
  { type: 'single', q: '企业所得税的基本税率为？', options: ['15%', '20%', '25%', '30%'], answer: [2], explanation: '企业所得税的基本税率为25%。符合条件的小型微利企业适用20%税率（实际有效税率更低），国家重点扶持的高新技术企业适用15%税率。' },
  { type: 'multi', q: '下列各项中，在计算企业所得税应纳税所得额时不得扣除的项目有？（多选）', options: ['向投资者支付的股息红利', '税收滞纳金', '企业发生的合理的工资薪金支出', '赞助支出'], answer: [0, 1, 3], explanation: '根据《企业所得税法》第十条规定，向投资者支付的股息红利等权益性投资收益款项、税收滞纳金、赞助支出等不得在税前扣除。企业发生的合理的工资薪金支出准予扣除。' },
  { type: 'judge', q: '个人取得的国债利息收入免征个人所得税。', options: ['正确', '错误'], answer: [0], explanation: '正确。根据《个人所得税法》第四条规定，国债和国家发行的金融债券利息免征个人所得税。' },
  { type: 'single', q: '个人所得税综合所得的年度汇算清缴时间为次年几月几日内？', options: ['3月1日至6月30日', '1月1日至3月31日', '3月1日至5月31日', '4月1日至6月30日'], answer: [0], explanation: '居民个人取得的综合所得，按年计算个人所得税，需要在次年3月1日至6月30日内办理汇算清缴。' },
  { type: 'multi', q: '下列属于个人所得税专项附加扣除项目的有？（多选）', options: ['子女教育', '继续教育', '大病医疗', '偶然所得'], answer: [0, 1, 2], explanation: '个人所得税专项附加扣除包括：子女教育、继续教育、大病医疗、住房贷款利息、住房租金、赡养老人、3岁以下婴幼儿照护七项。偶然所得属于个人所得税的税目分类，不是专项附加扣除项目。' },
  { type: 'judge', q: '房产税的计税依据只有房产原值一种方式。', options: ['正确', '错误'], answer: [1], explanation: '错误。房产税的计税依据分为两种：一是从价计征，按房产原值一次减除10%-30%后的余值计征，税率为1.2%；二是从租计征，按房产租金收入计征，税率为12%。' },
  { type: 'single', q: '印花税的纳税人是？', options: ['合同的担保人', '合同的订立人', '合同的见证人', '合同的审批人'], answer: [1], explanation: '印花税的纳税人是在中国境内书立、领受应税凭证的单位和个人，即合同的订立人。担保人、见证人、审批人均不是印花税纳税人。' },
  { type: 'multi', q: '下列各项中，属于车辆购置税征税范围的有？（多选）', options: ['汽车', '有轨电车', '汽车挂车', '自行车'], answer: [0, 1, 2], explanation: '车辆购置税的征税范围包括汽车、有轨电车、汽车挂车、排气量超过一百五十毫升的摩托车。自行车不属于车辆购置税征税范围。' },
  { type: 'judge', q: '城镇土地使用税以纳税人实际占用的土地面积为计税依据。', options: ['正确', '错误'], answer: [0], explanation: '正确。城镇土地使用税以纳税人实际占用的土地面积为计税依据，依照规定税额计算征收。' },
  { type: 'single', q: '消费税中，白酒的税率采用什么形式？', options: ['比例税率', '定额税率', '比例税率加定额税率（复合计征）', '超率累进税率'], answer: [2], explanation: '白酒消费税采用复合计征方式：比例税率为20%，加0.5元/500克的定额税率。目前只有白酒和卷烟两类产品采用复合计征。' },
  { type: 'multi', q: '下列哪些情形可以申请税收减免？（多选）', options: ['自然灾害导致重大损失', '高新技术企业研发投入', '小微企业月销售额未达起征点', '企业正常经营盈利'], answer: [0, 1, 2], explanation: '税收减免适用于法定情形：因自然灾害等不可抗力导致重大损失的可申请减免；高新技术企业享受15%优惠税率；小规模纳税人月销售额未达起征点免征增值税。企业正常经营盈利不属于减免情形。' }
];

// ========== State ==========
let state = { screen: 'start', currentIdx: 0, answers: [], selected: [], revealed: false, score: 0 };

// ========== Hooks ==========
const hooks = {
  startQuiz: 'startQuiz()',
  goBack: 'goBack()',
  submitAnswer: 'submitAnswer()',
  nextQuestion: 'nextQuestion()',
  selectOption: (i) => `selectOption(${i})`,
  typeLabel: (type) => ({ single: '单选题', multi: '多选题', judge: '判断题' })[type],
  typePill: (type) => ({ single: 'pill-single', multi: 'pill-multi', judge: 'pill-judge' })[type],
};

// ========== Render Dispatcher ==========
function render() {
  const themeDef = THEMES.find(t => t.id === currentTheme);
  if (!themeDef || !themeDef.render) return;

  const result = themeDef.render(state.screen, state, QUESTIONS, hooks);

  // Inject CSS
  const cache = document.getElementById('style-cache');
  cache.innerHTML = '<style>' + (result.css || '') + '</style>';

  // Inject HTML
  document.getElementById('app').innerHTML = result.html || '';

  // Post-render: apply option states if in quiz mode
  if (state.screen === 'quiz') {
    applyOptionStates();
  }
}

function applyOptionStates() {
  const q = QUESTIONS[state.currentIdx];
  if (!q) return;

  if (state.revealed) {
    // Mark correct/wrong
    document.querySelectorAll('[data-idx]').forEach(el => {
      el.classList.add('disabled');
      el.classList.remove('selected');
      const idx = parseInt(el.dataset.idx);
      if (q.answer.includes(idx)) el.classList.add('correct');
      else if (state.selected.includes(idx)) el.classList.add('wrong');
    });
  } else {
    // Restore selected
    state.selected.forEach(i => {
      const el = document.querySelector(`[data-idx="${i}"]`);
      if (el) el.classList.add('selected');
    });
  }
}

// ========== Interaction Functions ==========
function startQuiz() {
  state = { screen: 'quiz', currentIdx: 0, answers: [], selected: [], revealed: false, score: 0 };
  render();
}

function selectOption(i) {
  if (state.revealed) return;
  const q = QUESTIONS[state.currentIdx];
  if (q.type === 'multi') {
    state.selected = state.selected.includes(i)
      ? state.selected.filter(x => x !== i)
      : [...state.selected, i];
  } else {
    state.selected = [i];
  }
  // Update visual
  document.querySelectorAll('[data-idx]').forEach(el => el.classList.remove('selected'));
  state.selected.forEach(idx => {
    const el = document.querySelector(`[data-idx="${idx}"]`);
    if (el) el.classList.add('selected');
  });
}

function submitAnswer() {
  if (state.selected.length === 0) { toast('请先选择答案', 'warn'); return; }
  const q = QUESTIONS[state.currentIdx];
  const isCorrect = arraysEqual([...state.selected].sort((a,b)=>a-b), [...q.answer].sort((a,b)=>a-b));
  state.answers[state.currentIdx] = [...state.selected];
  state.revealed = true;

  // Mark options
  document.querySelectorAll('[data-idx]').forEach(el => {
    el.classList.add('disabled');
    el.classList.remove('selected');
    const idx = parseInt(el.dataset.idx);
    if (q.answer.includes(idx)) el.classList.add('correct');
    else if (state.selected.includes(idx)) el.classList.add('wrong');
  });

  if (isCorrect) {
    const pts = q.type === 'multi' ? 2 : 1;
    state.score += pts;
    toast(`回答正确 +${pts}分`, 'success');
  } else {
    toast('回答错误', 'danger');
  }

  // Re-render to show explanation + next button
  render();
}

function nextQuestion() {
  if (state.currentIdx + 1 < QUESTIONS.length) {
    state.currentIdx++;
    state.selected = [];
    state.revealed = false;
    render();
  } else {
    state.screen = 'result';
    render();
  }
}

function goBack() {
  state.screen = 'start';
  render();
}

// ========== Utils ==========
function arraysEqual(a, b) {
  return a.length === b.length && a.every((v, i) => v === b[i]);
}

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast ' + type; }, 2500);
}

// ========== Init ==========
// Wait for themes-combined.js to load
function init() {
  // Verify render functions exist
  const missing = THEMES.filter(t => typeof t.render !== 'function');
  if (missing.length) {
    console.error('Missing render functions:', missing.map(t => t.id));
    document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:#888">风格模板加载失败，请刷新页面</div>';
    return;
  }
  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
